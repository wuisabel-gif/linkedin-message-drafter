openapi: 3.1.0
info:
  title: LinkedIn Message Drafter
  description: Draft a personalized LinkedIn outreach message. Never scrapes or sends.
  version: 0.1.1
servers:
  # Replace with your own HTTPS host. Run the backend with `linkedin-draft-web`
  # (POST /api/draft) behind a public HTTPS endpoint — e.g. a reverse proxy or
  # a tunnel. ChatGPT Actions require HTTPS; localhost will not work.
  - url: https://YOUR-HOST.example.com
paths:
  /api/draft:
    post:
      operationId: draftMessage
      summary: Draft a personalized LinkedIn outreach message.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, context, goal]
              properties:
                name: { type: string, description: Prospect's name. }
                context: { type: string, description: The specific thing you noticed. }
                goal: { type: string, description: What you want, in one line. }
                company: { type: string }
                role: { type: string }
                relationship: { type: string }
                short:
                  type: boolean
                  description: If true, a connection-request note under 300 chars.
      responses:
        "200":
          description: The drafted message and its Cadence AI-slop score.
          content:
            application/json:
              schema:
                type: object
                properties:
                  draft: { type: string }
                  chars: { type: integer }
                  cadence_score: { type: integer, nullable: true }
                  cadence_grade: { type: string, nullable: true }
        "400":
          description: Missing/invalid fields.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error: { type: string }
