name: Publish to PyPI

# Publishes on a GitHub Release. Uses PyPI Trusted Publishing (OIDC) — no API
# token or secret is stored. Configure the trusted publisher once on PyPI:
# https://pypi.org/manage/account/publishing/  (see README "Publishing").

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build
        run: |
          python -m pip install build
          python -m build
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
